# Nginx config to serve static frontend and proxy /api to backend
# Place this at /etc/nginx/sites-available/hospital.conf and enable with a symlink

# MIME types configuration
include /etc/nginx/mime.types;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name hospital1000.devready.ng;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hospital1000.devready.ng;

    # Paths to Cloudflare origin cert or Let's Encrypt cert
    ssl_certificate /etc/ssl/certs/hospital_origin.pem;
    ssl_certificate_key /etc/ssl/private/hospital_origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    server_tokens off;
    charset utf-8;
    default_type text/html;

    # Enable gzip compression for text-based assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/rss+xml;
    gzip_disable "msie6";

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Cache-Control "public, max-age=3600" always;

    root /var/www/hospital;
    index index.html;

    # Increase accepted body size for file uploads
    client_max_body_size 50M;

    # Socket.io proxy: WebSocket real-time connections
    location /socket.io {
        proxy_pass http://127.0.0.1:4000/socket.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 10;
        proxy_buffering off;
    }

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Assets (CSS, JS, fonts) - cache for longer
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # API proxy: forward /api/* to local backend
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 10;
        # Prevent caching by intermediaries (CDN, proxies)
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_set_header Cache-Control "no-cache";
        proxy_cache_bypass $http_pragma;
    }

    # Optional: serve well-known for ACME challenges if using certbot
    location /.well-known/acme-challenge/ {
        alias /var/www/letsencrypt/.well-known/acme-challenge/;
    }
}
